<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="emerald-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
  </defs>
  <!-- Background with smooth rounded corners -->
  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  
  <!-- Sleek outer border -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="url(#brand)" stroke-width="4" opacity="0.4" />

  <!-- Photo Page Template Stacked Elements -->
  <!-- 1. PDF page outline (back layer) -->
  <path d="M140 100 H320 L390 170 V400 C390 412 380 422 368 422 H140 C128 422 118 412 118 400 V122 C118 110 128 100 140 100 Z" fill="#1e293b" stroke="#475569" stroke-width="6" />
  <path d="M320 100 V170 H390" fill="none" stroke="#475569" stroke-width="6" />

  <!-- 2. Colorful Image Card (Mid layer, offset) -->
  <rect x="180" y="180" width="220" height="200" rx="20" fill="#334155" stroke="url(#emerald-grad)" stroke-width="5" />
  
  <!-- Image landscape vector inside photo card -->
  <path d="M195 330 L240 280 L290 320 L350 250 L400 330 Z" fill="url(#emerald-grad)" opacity="0.8" />
  <circle cx="240" cy="225" r="15" fill="#e2e8f0" />

  <!-- 3. Dynamic Sparkle Logo/Watermark (Front overlay) -->
  <g transform="translate(320, 150) scale(1.6)">
    <!-- Starburst Badge -->
    <path d="M0 -20 L5 -5 L20 0 L5 5 L0 20 L-5 5 L-20 0 L-5 -5 Z" fill="url(#brand)" />
    <!-- Center white glow -->
    <circle cx="0" cy="0" r="3" fill="#ffffff" />
  </g>

  <!-- Text elements for brand identity -->
  <text x="256" y="470" font-family="'Inter', sans-serif, system-ui" font-size="34" font-weight="900" text-anchor="middle" fill="#f8fafc" letter-spacing="2">
    PRO CONVERTER
  </text>
</svg>
